<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma présentation Prenium</title>
    <style>
        body {
         background: linear-gradient(135deg, #1e3c72, #2a5298);
         display: flex;
         justify-content: center;
         align-items: center;
         height: 100vh;
         margin: 0;
         font-family: Arial, Helvetica, sans-serif;
        }

        .card {
            background-color: white;
            width: 380px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0, 15);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .card h1 {
            color: #1e3c72;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .card p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .card a {
            display: inline-block;
            background-color: #1e3c72;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
        }

        .card a:hover {
            background-color: #16325c;
        }
    </style>
</head>
<body>
    <div class="card">
     <img src="https://img.covers.com/cms/covers/a8fd5bfe-f9db-4d9f-8978-8711d01ae131.JPG" 
     alt="photo de Arif CHITOU">
     <h1>Arif CHITOU</h1>
     <p>Développeur Web et Créateur de contenu</p>
     <a href="#">Me contacter</a>  
    </div>
</body>
</html>
